<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
  </head>
  <body>
    <a href="../index.html">Volver al index</a>
    <main>
      <form
        action="https://formspree.io/f/xykbwqlb"
        method="get"
        target="_blank"
      >
        <fieldset>
          <legend>Informacion Personal</legend>

          <label for="nombre">Nombre:</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ingrese su Nombre..."
            required
          />

          <label for="email">Correo Eléctronico:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Ingrese su Correo..."
            required
          />
        </fieldset>
        <fieldset>
          <legend>Motivo y Mensaje</legend>

          <label for="motivo">Motivo:</label>
          <select id="motivo" name="motivo">
            <option value="">---Seleccioná una opción---</option>
            <option value="consulta">Consulta</option>
            <option value="soporte">Soporte</option>
            <option value="otros">Otros</option>
          </select>

          <label for="mensaje">Mensaje:</label>
          <textarea
            id="mensaje"
            name="mensaje"
            rows="4"
            cols="30"
            placeholder="Hola, me comunico por..."
          ></textarea>
        </fieldset>
        <section>
          <button type="submit">Enviar</button>
          <button type="reset">Limpiar</button>
        </section>
      </form>
      <hr />
      <hr />
      <h2>Formulario (POST)</h2>
      <form action="" method="post" autocomplete="off" novalidate>
        <div>
          <label for="user">Usuario</label>
          <input id="user" name="user" required />
        </div>
        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" name="pass" type="password" required minlength="6" />
        </div>
        <button type="submit">Enviar</button>
      </form>
      <p>
        con <strong>POST</strong> la URL no muestra los datos. (Hace falta un
        servidor para "ver" lo que llegó.)
      </p>
    </main>
  </body>
</html>
