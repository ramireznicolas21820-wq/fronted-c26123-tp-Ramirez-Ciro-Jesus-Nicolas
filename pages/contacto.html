    <main>
      <form action="https://formspree.io/f/xykbwqlb" method="post">
        <label for="nombre">Nombre:</label>
        <input class="input" type="text" id="nombre" name="nombre" />

        <label for="email">Correo:</label>
        <input class="input" type="email" id="email" name="email" />

        <label for="mensaje">Mensaje:</label>
        <textarea class="input" id="mensaje" name="mensaje"></textarea>

        <button class="btn" type="submit">Enviar</button>
      </form>
    </main>
    <footer>Formulario para contactarse por cualquier problema.</footer>
